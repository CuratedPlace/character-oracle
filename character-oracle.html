<!DOCTYPE html>
<html lang="en">
<!-- Character Oracle v2 -->
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Character Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Barlow:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --c-bg:        #06090f;
  --c-scene:     #080c18;
  --c-panel:     #070b15;
  --c-panel-top: #050810;
  --c-border:    rgba(90,120,200,0.18);
  --c-gold:      #f0c040;
  --c-gold-dim:  #9a7a20;
  --c-blue:      #5090ff;
  --c-blue-dim:  #1a3060;
  --c-purple:    #9060ff;
  --c-text:      #d8dff5;
  --c-text-dim:  #5a6888;
  --c-text-hi:   #ffffff;
  --c-glow-ball: rgba(80,60,200,0.3);
}

html, body {
  width: 100%; height: 100%;
  background: var(--c-bg);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}

/* ── GAME CONTAINER ── */
#game {
  width: min(100vw, 133.4vh);
  height: min(75vw, 100vh);
  display: flex; flex-direction: column;
  background: var(--c-bg);
  position: relative; overflow: hidden;
  box-shadow: 0 0 80px rgba(60,40,160,.5), 0 0 0 1px rgba(80,100,200,.15);
}

/* ══════════════════════════════════════
   SCENE  (top 56%)
══════════════════════════════════════ */
#scene {
  flex: 0 0 56%;
  position: relative; overflow: hidden;
  background: var(--c-scene);
}

/* deep space gradient */
#scene-bg {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 100%, rgba(60,30,140,.35) 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 30% 20%,  rgba(20,20,80,.4)   0%, transparent 60%),
    radial-gradient(ellipse 50% 45% at 75% 10%,  rgba(40,15,80,.3)   0%, transparent 55%),
    linear-gradient(180deg, #030510 0%, #070c1e 55%, #0c0a20 100%);
}

/* subtle light cone from above */
#light-cone {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 60%; height: 65%;
  background: radial-gradient(ellipse 50% 100% at 50% 0%,
    rgba(100,80,220,.12) 0%,
    rgba(80,60,180,.06) 40%,
    transparent 100%);
  pointer-events: none;
}

/* stars */
#stars { position: absolute; inset: 0; pointer-events: none; }
.star {
  position: absolute;
  border-radius: 50%;
  background: #fff;
}
@keyframes twinkle {
  0%,100%{opacity:var(--op)} 50%{opacity:calc(var(--op)*.15)}
}

/* platform / surface */
#platform {
  position: absolute; bottom: 0; left: 0; right: 0; height: 28%;
  background: linear-gradient(180deg,
    rgba(10,8,22,.0)  0%,
    rgba(10,8,22,.6) 40%,
    rgba(6,5,14,1)  100%);
}
#platform::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(80,100,200,.3), rgba(150,120,255,.4), rgba(80,100,200,.3), transparent);
}

/* under-ball glow on platform */
/* ── TAROT CARD ── */
#ball-wrap {
  position: absolute;
  bottom: 4%; left: 50%; transform: translateX(-50%);
  cursor: pointer; z-index: 10;
  display: flex; flex-direction: column; align-items: center;
  gap: clamp(6px,1.2vmin,12px);
}

#ball-btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600; letter-spacing: .18em;
  font-size: clamp(8px,1.35vmin,13px);
  text-transform: uppercase;
  color: var(--c-text);
  background: linear-gradient(90deg, rgba(60,30,120,.65), rgba(30,60,140,.65));
  border: 1px solid rgba(120,140,255,.35);
  border-radius: 3px;
  padding: clamp(5px,1vmin,9px) clamp(14px,2.8vmin,28px);
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: color .3s, border-color .3s;
}
/* brighter sliding fill on hover */
#ball-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--c-purple), var(--c-blue));
  transform: translateX(-101%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  z-index: 0;
}
#ball-btn span { position: relative; z-index: 1; }
#ball-wrap:hover #ball-btn,
#ball-btn:hover {
  color: var(--c-text-hi);
  border-color: transparent;
}
#ball-wrap:hover #ball-btn::before,
#ball-btn:hover::before { transform: translateX(0); }

/* ── TAROT CARD INNER ── */
#tarot-card {
  width: clamp(100px,19vmin,175px);
  aspect-ratio: 57 / 100;
  position: relative;
  border: 2px solid rgba(200,170,80,.45);
  border-radius: 5px;
  overflow: hidden;
  box-shadow:
    0 0 28px rgba(80,50,200,.4),
    0 10px 35px rgba(0,0,0,.7),
    inset 0 0 0 1px rgba(255,220,100,.1);
  transition: box-shadow .25s;
  background: #08051a;
  opacity: 0;                 /* hidden until first question loads */
}
#tarot-card.loaded { opacity: 1; }
#ball-wrap:hover #tarot-card.loaded {
  box-shadow:
    0 0 45px rgba(100,70,240,.6),
    0 10px 35px rgba(0,0,0,.7),
    inset 0 0 0 1px rgba(255,220,100,.15);
}

#tarot-img {
  width: 100%; height: 83%;
  object-fit: cover; object-position: top;
  display: block;
}

#tarot-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 17%;
  background: linear-gradient(180deg, #0c001e, #18003a);
  border-top: 1px solid rgba(200,170,60,.35);
  display: flex; align-items: center; justify-content: center;
  padding: 2px 6px;
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; letter-spacing: .13em;
  font-size: clamp(6px,1.1vmin,10px);
  color: var(--c-gold);
  text-align: center; text-transform: uppercase;
  line-height: 1.2; word-break: break-word;
}

/* card flip — two-phase so old card exits, new card enters */
@keyframes fadeOut {
  from { opacity: 1; }
  to   { opacity: 0; }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
@keyframes cardGlow {
  0%,100%{ box-shadow:0 0 28px rgba(80,50,200,.4),0 10px 35px rgba(0,0,0,.7); }
  50%    { box-shadow:0 0 65px rgba(120,80,255,.85),0 10px 35px rgba(0,0,0,.7),0 0 100px rgba(80,50,200,.4); }
}
#tarot-card.flip-out,
#q-text.flip-out     { animation: fadeOut .3s ease-in  forwards; }
#tarot-card.flip-in,
#q-text.flip-in      { animation: fadeIn  .3s ease-out forwards; }

/* ══════════════════════════════════════
   SEPARATOR
══════════════════════════════════════ */
#sep {
  flex: 0 0 1px;
  background: linear-gradient(90deg,
    transparent 0%, var(--c-blue-dim) 15%,
    rgba(90,120,255,.5) 50%,
    var(--c-blue-dim) 85%, transparent 100%);
}

/* progress bar */
#progress-track {
  flex: 0 0 3px; background: rgba(255,255,255,.05);
}
#progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--c-purple), var(--c-blue));
  transition: width .4s ease;
  box-shadow: 0 0 6px rgba(100,130,255,.6);
}

/* ══════════════════════════════════════
   UI PANEL  (bottom 44%)
══════════════════════════════════════ */
#ui {
  flex: 0 0 44%;
  background: var(--c-panel);
  display: flex; flex-direction: column;
}

/* part / counter bar */
#part-bar {
  flex: 0 0 auto;
  background: var(--c-panel-top);
  padding: clamp(5px,1vmin,9px) clamp(10px,2vmin,20px);
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
  border-bottom: 1px solid var(--c-border);
}
#part-name {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600; letter-spacing: .12em;
  font-size: clamp(13px,2.6vmin,24px);
  color: var(--c-blue); text-transform: uppercase;
  flex: 1; min-width: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#q-counter {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700;
  font-size: clamp(13px,2.6vmin,24px);
  color: var(--c-gold); white-space: nowrap;
  letter-spacing: .05em;
}

/* question display */
#q-display {
  flex: 1; min-height: 0;
  padding: clamp(8px,1.6vmin,16px) clamp(10px,2.2vmin,22px);
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
#q-text {
  font-family: 'Barlow', sans-serif;
  font-weight: 400;
  font-size: clamp(13px,2.8vmin,26px);
  color: var(--c-text);
  text-align: center;
  line-height: 1.75;
  white-space: pre-line;
}
#q-cursor {
  display: inline-block;
  width: clamp(5px,.85vmin,8px);
  height: clamp(9px,1.55vmin,14px);
  background: var(--c-blue); margin-left: 3px;
  vertical-align: middle; opacity: .9;
  animation: blink 1.1s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:.9} 50%{opacity:0} }

/* controls */
#controls {
  flex: 0 0 auto;
  background: var(--c-panel-top);
  border-top: 1px solid var(--c-border);
  padding: clamp(5px,1vmin,9px) clamp(10px,2vmin,20px);
  display: flex; align-items: center; justify-content: center;
  gap: clamp(4px,.8vmin,8px);
}

.btn {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600; letter-spacing: .1em;
  font-size: clamp(7px,1.15vmin,11px);
  text-transform: uppercase;
  padding: clamp(4px,.8vmin,7px) clamp(8px,1.5vmin,16px);
  background: rgba(255,255,255,.03);
  color: var(--c-text-dim);
  border: 1px solid rgba(80,100,200,.25);
  border-radius: 3px;
  cursor: pointer;
  transition: background .15s, color .15s, border-color .15s, box-shadow .15s;
  white-space: nowrap; user-select: none;
}
.btn:hover {
  background: rgba(80,120,255,.12);
  color: var(--c-text-hi);
  border-color: rgba(100,150,255,.5);
  box-shadow: 0 0 12px rgba(80,120,255,.2);
}
.btn:active { background: rgba(80,120,255,.22); transform: translateY(1px); }

.btn-icon {
  padding-left: clamp(6px,1.1vmin,12px);
  padding-right: clamp(6px,1.1vmin,12px);
}

.btn-shake {
  background: rgba(90,60,200,.2);
  color: var(--c-gold);
  border-color: rgba(150,120,30,.4);
  padding-left: clamp(12px,2.5vmin,28px);
  padding-right: clamp(12px,2.5vmin,28px);
  box-shadow: 0 0 16px rgba(90,60,180,.25);
}
.btn-shake:hover {
  background: rgba(110,80,240,.35);
  color: var(--c-gold);
  border-color: rgba(200,160,40,.6);
  box-shadow: 0 0 28px rgba(100,70,220,.45);
}

.ctrl-sep {
  width: 1px; height: clamp(14px,2.2vmin,20px);
  background: var(--c-border);
  flex-shrink: 0;
}

/* section indicator (right edge) */

/* ══════════════════════════════════════
   TITLE SCREEN
══════════════════════════════════════ */
#title {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 50% 58%, rgba(80,50,200,.18) 0%, transparent 65%),
    rgba(5,7,14,.9);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: clamp(8px,1.6vmin,16px);
  z-index: 200; cursor: pointer;
  overflow: hidden;
}

/* ── Background tarot card spread ── */
#title-cards {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -48%);
  display: flex; align-items: flex-end; justify-content: center;
  gap: clamp(-30px,-5vmin,-10px);
  pointer-events: none;
  animation: titleFloat 7s ease-in-out infinite;
}
@keyframes titleFloat {
  0%,100% { transform: translate(-50%,-48%) translateY(0);    }
  45%     { transform: translate(-50%,-48%) translateY(-10px); }
  75%     { transform: translate(-50%,-48%) translateY(-5px);  }
}
.title-card-bg {
  width: clamp(70px,15vmin,135px);
  aspect-ratio: 57 / 100;
  border: 1.5px solid rgba(200,170,80,.25);
  border-radius: 5px; overflow: hidden;
  box-shadow: 0 0 18px rgba(80,50,200,.25), 0 10px 30px rgba(0,0,0,.6);
  flex-shrink: 0;
}
.title-card-bg img {
  width: 100%; height: 100%;
  object-fit: cover; display: block;
  filter: brightness(.55) saturate(.7);
}
.tc-bg-left  {
  transform: rotate(-14deg) translateY(12%);
  opacity: .45; z-index: 1;
}
.tc-bg-center {
  transform: scale(1.15) translateY(-4%);
  opacity: .55; z-index: 3;
  border-color: rgba(200,170,80,.4);
  box-shadow: 0 0 30px rgba(100,70,220,.4), 0 12px 35px rgba(0,0,0,.65);
}
.tc-bg-right {
  transform: rotate(14deg) translateY(12%);
  opacity: .45; z-index: 1;
}

/* Title content sits above the ball */
#title-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center;
  gap: clamp(8px,1.6vmin,16px);
}

.t-rule {
  width: 54%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(150,120,255,.5), var(--c-gold-dim), rgba(150,120,255,.5), transparent);
}

#title h1 {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 700; letter-spacing: .18em;
  font-size: clamp(18px,3.6vmin,34px);
  color: var(--c-text-hi); text-align: center; line-height: 1.5;
  text-shadow: 0 0 30px rgba(160,120,255,.6), 0 0 60px rgba(100,70,200,.35), 0 2px 4px rgba(0,0,0,.8);
}
#title h2 {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600; letter-spacing: .12em;
  font-size: clamp(9px,1.6vmin,15px);
  color: var(--c-text); text-align: center; line-height: 1.6;
  text-transform: uppercase; max-width: 70%;
  text-shadow: 0 1px 3px rgba(0,0,0,.8);
}
#title p {
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  font-size: clamp(7px,1.1vmin,10px);
  color: var(--c-text-dim); text-align: center; line-height: 2;
  text-shadow: 0 1px 3px rgba(0,0,0,.8);
}
.title-cta {
  font-family: 'Rajdhani', sans-serif;
  font-weight: 600; letter-spacing: .18em;
  font-size: clamp(9px,1.5vmin,14px);
  text-transform: uppercase;
  color: var(--c-text);
  background: linear-gradient(90deg, rgba(60,30,120,.65), rgba(30,60,140,.65));
  border: 1px solid rgba(120,140,255,.35);
  border-radius: 3px;
  padding: clamp(6px,1.1vmin,10px) clamp(18px,3.5vmin,36px);
  cursor: pointer;
  position: relative; overflow: hidden;
  transition: color .3s, border-color .3s;
}
.title-cta::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--c-purple), var(--c-blue));
  transform: translateX(-101%);
  transition: transform .35s cubic-bezier(.4,0,.2,1);
  z-index: 0;
}
.title-cta span { position: relative; z-index: 1; }
.title-cta:hover { color: var(--c-text-hi); border-color: transparent; }
.title-cta:hover::before { transform: translateX(0); }

/* ── Curated Place logo ── */
#title-logo {
  width: clamp(160px,32vmin,300px);
  opacity: .85;
  display: block;
  filter: drop-shadow(0 2px 8px rgba(0,0,0,.5));
  margin-bottom: clamp(4px,.8vmin,8px);
}
#app-logo {
  position: absolute;
  bottom: clamp(6px,1.2vmin,12px);
  right: clamp(8px,1.5vmin,14px);
  width: clamp(70px,12vmin,110px);
  opacity: .6;
  mix-blend-mode: screen;
  z-index: 20;
  pointer-events: none;
}
</style>
</head>

// ── flat list + part-start index ──
const ALL_Q = [];
const PART_STARTS = [];
let cum = 0;
PARTS.forEach((part, pi) => {
  PART_STARTS.push(cum);
  part.qs.forEach((q, qi) => {
    ALL_Q.push({ text:q, num:cum+1, pi, pq:qi+1, pt:part.qs.length, pname:part.name });
    cum++;
  });
});
const TOTAL = ALL_Q.length; // 253

// ── state ──
let cur       = -1;
let animating = false;
let started   = false;
let twTimer   = null;

// ════════════════════════════════════════════════
//  SCENE BUILD
// ════════════════════════════════════════════════
function buildStars() {
  const el = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() < .14 ? 2.5 : (Math.random() < .35 ? 1.8 : 1.2);
    s.style.cssText = `
      left:${Math.random()*100}%;
      top:${Math.random()*85}%;
      width:${sz}px; height:${sz}px;
      --op:${(.25 + Math.random()*.75).toFixed(2)};
      opacity:var(--op);
      animation:twinkle ${2.5+Math.random()*3.5}s ${Math.random()*5}s infinite;
    `;
    el.appendChild(s);
  }
}

// ════════════════════════════════════════════════
//  DISPLAY
// ════════════════════════════════════════════════
function showQ(idx, animate) {
  const q = ALL_Q[idx];
  const sectionName = q.pname.replace(/^Part \d+ · /, '');
  document.getElementById('part-name').textContent = `Character Traits: ${sectionName}`;
  document.getElementById('q-counter').textContent = `Q.${String(q.num).padStart(3,'0')} / ${TOTAL}`;

  // progress bar
  document.getElementById('progress-fill').style.width = ((q.num / TOTAL) * 100) + '%';

  const el = document.getElementById('q-text');
  const txt = q.text.replace(/\? (?=\S)/g, '?\n');
  if (twTimer) { clearTimeout(twTimer); twTimer = null; }
  if (animate) {
    el.textContent = '';
    let i = 0;
    (function type() {
      if (i < txt.length) { el.textContent += txt[i++]; twTimer = setTimeout(type, 18); }
    })();
  } else {
    el.textContent = txt;
  }
}

// ════════════════════════════════════════════════
//  BALL
// ════════════════════════════════════════════════
function handleBall() {
  if (!started) { startOracle(); return; }
  if (animating) return;
  animating = true;

  const card  = document.getElementById('tarot-card');
  const img   = document.getElementById('tarot-img');
  const qText = document.getElementById('q-text');

  let nxt;
  do { nxt = Math.floor(Math.random() * TOTAL); } while (nxt === cur && TOTAL > 1);

  // Preload the incoming image immediately so it's ready when we need it
  const newSrc = TAROT_CARDS[ALL_Q[nxt].pi].img;
  const preload = new Image();
  let imgReady = false;
  let fadeOutDone = false;

  function doSwap() {
    if (!imgReady || !fadeOutDone) return;
    // Both conditions met: swap content while fully invisible
    cur = nxt;
    img.src = newSrc;
    document.getElementById('tarot-label').textContent = ALL_Q[cur].pname.replace(/^Part \d+ · /, '');
    showQ(cur, false);
    card.classList.remove('flip-out');
    qText.classList.remove('flip-out');
    void card.offsetWidth;
    card.classList.add('flip-in');
    qText.classList.add('flip-in');
    setTimeout(() => {
      card.classList.remove('flip-in');
      qText.classList.remove('flip-in');
      showQ(cur, true);
      animating = false;
    }, 320);
  }

  preload.onload = preload.onerror = () => { imgReady = true;    doSwap(); };
  preload.src = newSrc;

  // Fade out card + text together
  card.classList.add('flip-out');
  qText.classList.add('flip-out');
  setTimeout(() => { fadeOutDone = true; doSwap(); }, 300);
}

function revealQ(idx) {
  if (!started) { startOracle(); return; }
  cur = ((idx % TOTAL) + TOTAL) % TOTAL;
  updateCard(cur);
  showQ(cur, true);
}

function goPrev()    { if (!animating) revealQ(cur <= 0 ? TOTAL - 1 : cur - 1); }
function goNext()    { if (!animating) revealQ(cur + 1); }
function jumpPart(d) {
  if (animating) return;
  const pi = ALL_Q[Math.max(0, cur)].pi;
  let np = pi + d;
  if (np < 0) np = PARTS.length - 1;
  if (np >= PARTS.length) np = 0;
  revealQ(PART_STARTS[np]);
}

// ════════════════════════════════════════════════
//  START
// ════════════════════════════════════════════════
function startOracle() {
  started = true;
  const overlay = document.getElementById('title');
  overlay.style.transition = 'opacity .7s';
  overlay.style.opacity = '0';
  setTimeout(() => overlay.style.display = 'none', 720);

  setTimeout(() => {
    cur = 0;
    updateCard(0);
    showQ(0, true);
  }, 500);
}

// ════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (!started) { startOracle(); return; }
  const map = {
    ArrowLeft:  goPrev,
    ArrowRight: goNext,
    ArrowUp:    () => jumpPart(-1),
    ArrowDown:  () => jumpPart(1),
    ' ':        handleBall,
    Enter:      handleBall
  };
  if (map[e.key]) { e.preventDefault(); map[e.key](); }
});

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
buildStars();
</script>
